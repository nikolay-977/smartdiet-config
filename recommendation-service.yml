spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/nutrilogic_recommendations
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

openrouter:
  api-key: ${OPENROUTER_API_KEY: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}
  base-url: https://openrouter.ai/api/v1
  model: openai/gpt-3.5-turbo
  max-tokens: 500
  temperature: 0.7
  site-url: http://localhost:8081
  site-name: smartdiet

product-service:
  url: http://localhost:8082

server:
  port: 8081

logging:
  level:
    com.nutrilogic.recommendation: INFO
    org.springframework.web: INFO