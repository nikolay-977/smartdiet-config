spring:
  application:
    name: recommendation-service
  datasource:
    url: jdbc:postgresql://postgres:5432/nutrilogic_recommendations
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

product-service:
  url: http://product-service:8082

server:
  port: 8081

logging:
  level:
    com.nutrilogic.recommendation: INFO