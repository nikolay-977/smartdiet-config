spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/recommendationdb
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-3.5-turbo
  max-tokens: 500
  temperature: 0.7

openfoodfacts:
  base-url: https://world.openfoodfacts.org/api/v0

product-service:
  url: http://localhost:8082